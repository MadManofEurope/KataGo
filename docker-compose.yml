services:
  katago:
    image: katago-json:${IMAGE_TAG:-dev}
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: katago-analysis
    environment:
      KATAGO_MODEL: /models/latest.bin.gz
      KATAGO_PORT: "${KATAGO_PORT:-2388}"
      KATAGO_CONTAINER_PORT: "${KATAGO_CONTAINER_PORT:-2388}"
      KATAGO_ANALYSIS_THREADS: "${KATAGO_ANALYSIS_THREADS:-}"
      KATAGO_VISITS: "${KATAGO_VISITS:-}"
      KATAGO_SEARCH_THREADS: "${KATAGO_SEARCH_THREADS:-}"
      KATAGO_CONFIG: /config/analysis.cfg
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    ports:
      - "127.0.0.1:${KATAGO_PORT:-2388}:${KATAGO_CONTAINER_PORT:-2388}"
    volumes:
      - ./models:/models:ro
      - ./config/analysis.cfg:/config/analysis.cfg:ro
    device_requests:
      - driver: nvidia
        count: 1
        capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -X POST -H 'Content-Type: application/json' -d '{\"id\":\"healthcheck\",\"action\":\"query_version\"}' http://127.0.0.1:${KATAGO_CONTAINER_PORT:-2388} >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
