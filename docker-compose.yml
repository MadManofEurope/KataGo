services:
  katago:
    build: { context: ".", dockerfile: "Dockerfile" }
    image: katago-json:${GIT_SHA_SHORT:-local}
    environment:
      PORT: "${PORT:-2388}"
      KATAGO_CONFIG: "${KATAGO_CONFIG:-/config/analysis.cfg}"
      KATAGO_MODEL: "/models/latest.bin.gz"
    ports:
      - "${PORT:-2388}:${PORT:-2388}"
    volumes:
      - ./config:/config:ro
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS http://127.0.0.1:2388 -H 'Content-Type: application/json' -d '{"id":"ping","action":"query_version"}' >/dev/null || exit 1
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
      start_interval: 5s
