version: "3.8"

services:
  katago:
    image: ${KATAGO_IMAGE:-katago-json:latest}
    container_name: katago-json
    environment:
      - KATAGO_MODEL=/models/${KATAGO_MODEL_FILE:-latest.bin.gz}
      - KATAGO_CONFIG=/config/${KATAGO_CONFIG_FILE:-analysis.cfg}
      - KATAGO_PORT=${KATAGO_PORT:-2388}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "127.0.0.1:${KATAGO_PORT:-2388}:2388"
    volumes:
      - ${KATAGO_MODEL_DIR:-./models}:/models:ro
      - ${KATAGO_CONFIG_DIR:-./config}:/config:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

