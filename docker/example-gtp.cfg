# These are examples; KaTrain will pass -config or -analysisconfig with absolute paths.
# Use this as a starting point for kataGo GTP play with the Dockerized wrapper.

maxVisits = 1000
numSearchThreads = 16
ponderingEnabled = false
nnMaxBatchSize = 16
nnCacheSizePowerOfTwo = 20
nnMutexPoolSizePowerOfTwo = 16
allowResignation = true
resignThreshold = -0.95
cudaUseFP16 = true
cudaUseNHWC = true
