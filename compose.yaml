services:
  katago:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: katago-json:${GIT_SHA:-local}
    environment:
      PORT: "${PORT:-2388}"
      KATAGO_CONFIG: "${KATAGO_CONFIG:-/config/analysis.cfg}"
      KATAGO_MODEL: "/models/latest.bin.gz"
    ports:
      - "${PORT:-2388}:${PORT:-2388}"
    volumes:
      - ./config:/config:ro
      - ./models:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    healthcheck:
      test:
        - CMD-SHELL
        - >
          curl -fsS -X POST http://127.0.0.1:${PORT:-2388}
          -H 'Content-Type: application/json'
          -d '{"id":"ping","action":"query_version"}'
          >/dev/null
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s
